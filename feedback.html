<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Sílabo | GSI UPLA</title>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/s2/favicons?domain=upla.edu.pe&sz=64">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d4edd;
            --primary-soft: #e0aaff;
            --bg-light: #f3f4f6;
            --white: #ffffff;
            --text-dark: #1e1b4b;
            --text-dim: #64748b;
            --accent: #5a189a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 40px 20px;
            margin: 0;
        }

        /* Contenedor principal estilizado */
        .content {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 700px;
            margin: 0 auto;
            overflow: hidden; /* Importante para redondear la imagen */
            border-bottom: 8px solid var(--primary);
        }

        /* ESTILO DE LA CABECERA CON IMAGEN */
        .form-header {
            width: 100%;
            height: 200px;
            background-image: linear-gradient(rgba(30, 27, 75, 0.5), rgba(90, 24, 154, 0.8)), 
                              url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-header h1 { font-weight: 800; margin: 0 0 5px 0; font-size: 2rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .form-header .subtitle { color: var(--primary-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.8rem; margin: 0; }

        /* Estilos del Formulario (Padding solo aquí) */
        .form-body { padding: 40px 45px; }
        
        .form-group { margin-bottom: 25px; }
        
        label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 10px; 
            color: var(--accent); 
            font-size: 0.95rem; 
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-soft);
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(157, 78, 221, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #edf2f7;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(90, 24, 154, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(90, 24, 154, 0.3);
            filter: brightness(1.1);
        }

        /* BOTÓN VOLVER AL INICIO REDISEÑADO */
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 30px auto;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
            padding: 12px 25px;
            border: 2px solid var(--primary-soft);
            border-radius: 50px;
            background: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: fit-content;
        }

        .back-link:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateX(-5px);
            box-shadow: 0 6px 15px rgba(157, 78, 221, 0.2);
        }

        /* Contenedor para centrar el botón */
        .footer-nav {
            text-align: center;
            width: 100%;
        }

        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="content">
        <div class="form-header">
            <h1>Mejora del Sílabo</h1>
            <span class="subtitle">Evaluación Académica | UPLA GSI</span>
        </div>

        <div class="form-body">
            <form id="formSilabo">
                <div class="form-group">
                    <label>Docente / Evaluador</label>
                    <input type="text" placeholder="Nombre completo" id="nombre">
                </div>

                <div class="form-group">
                    <label>Cumplimiento del Sílabo (Unidad I y II)</label>
                    <select id="cumplimiento">
                        <option value="100">Objetivos alcanzados al 100%</option>
                        <option value="75">Objetivos alcanzados al 75%</option>
                        <option value="50">Objetivos alcanzados al 50%</option>
                        <option value="0">Contenido pendiente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Calidad de los Recursos Digitales</label>
                    <div class="radio-group">
                        <label class="radio-option"><input type="radio" name="val" value="5"> Excelente</label>
                        <label class="radio-option"><input type="radio" name="val" value="4"> Bueno</label>
                        <label class="radio-option"><input type="radio" name="val" value="3"> Regular</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Propuesta de Mejora Temática</label>
                    <textarea placeholder="¿Qué sugerencia técnica tiene para el desarrollo de la siguiente unidad?" id="propuesta" style="height: 80px; resize: none;"></textarea>
                </div>

                <button type="button" class="btn-submit" onclick="enviarYLimpiar()">
                    Registrar Evaluación
                </button>
            </form>
        </div>
    </div>

<div class="footer-nav">
        <a href="index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Volver al Panel Principal
        </a>
    </div>

    <script>
        function enviarYLimpiar() {
            // 1. Mostrar mensaje de éxito
            alert('Registro Académico Enviado Correctamente.\nLos datos han sido procesados para la mejora continua.');
            
            // 2. Resetear el formulario (borra todo)
            document.getElementById('formSilabo').reset();
        }
    </script>

</body>
</html>
